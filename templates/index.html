<!DOCTYPE html>
<html>
<head>
    <title>Booking Success - 6ixNine9 Motorsport</title>

    <style>

        body {
            margin: 0;
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: #1b1b1b;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 450px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .success {
            font-size: 30px;
            color: #4CAF50;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .booking-id {
            background: #2b2b2b;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 18px;
        }

        .button {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin-top: 15px;
            padding: 14px;
            background: #1f6aa5;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .button:hover {
            background: #1590ff;
        }

        .info {
            color: #cccccc;
            margin-top: 10px;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

<div class="box">

    <div class="success">
        ✔ Booking Successful
    </div>

    <p class="info">
        Thank you for choosing 6ixNine9 Motorsport.
    </p>

    <div class="booking-id">
        Booking ID:<br>
        <b>{{ booking_id }}</b>
    </div>

    <a class="button" href="{{ pdf_url }}" download>
        📄 Download Invoice PDF
    </a>

    <a class="button" href="/">
        🔙 Back To Home
    </a>

</div>

</body>
</html>
