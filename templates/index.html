<!DOCTYPE html>
<html>

<title>6ixNine9 Motorsport Booking</title>


<style>

body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;

.header {
    text-align:center;

    background:#1c1c1c;
    font-size:22px;
    font-weight:bold;

.container {

    display:flex;

}


.box {

    background:#1b1b1b;

    margin-bottom:15px;

}


input,select {

    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;

    border:none;
    border-radius:5px;

    background:#2b2b2b;
    color:white;

}



button {

    width:100%;
    padding:12px;

    background:#1f6aa5;

    border:none;
    border-radius:5px;

    color:white;
    font-weight:bold;

}


button:hover {

    background:#1590ff;

}



.status {

    white-space:pre-line;
    font-size:13px;
    color:#ccc;

}
